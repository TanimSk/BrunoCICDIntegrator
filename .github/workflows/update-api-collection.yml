name: 🤖 AI — Changelog + Bruno Collection Updater

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      model:
        description: "OpenAI model"
        required: false
        default: "gpt-4o-mini"
        type: choice
        options:
          - gpt-4o-mini
          - gpt-4o
          - gpt-4-turbo
          - gpt-4.1
          - gpt-4.1-mini
          - gpt-3.5-turbo
      collection_dir:
        description: "Bruno collection directory"
        required: false
        default: "bruno-collection"
      changelog_file:
        description: "Changelog file path"
        required: false
        default: "CHANGELOG.md"
      dry_run:
        description: "Dry run — print output without writing files or committing"
        required: false
        default: "false"
        type: boolean

env:
  DEFAULT_MODEL: "gpt-4o-mini"
  COLLECTION_DIR: "bruno-collection"
  CHANGELOG_FILE: "CHANGELOG.md"

# ── Job 1: Gate on commit message ─────────────────────────────────────────────
jobs:
  check-trigger:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: 🔎 Inspect commit message
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "✅ Manual trigger — running unconditionally."
            exit 0
          fi

          MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qi "make collection"; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "✅ 'make collection' found — pipeline will run."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  'make collection' not in commit message — skipping."
          fi

# ── Job 2: Two-stage AI pipeline ──────────────────────────────────────────────
  run-pipeline:
    name: Run AI pipeline
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - name: 📦 Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── Stage 1: AI writes changelog entry ──────────────────────────────────
      - name: 📝 Stage 1 — AI writes changelog entry
        run: python scripts/update_collection.py --stage changelog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event.inputs.model || env.DEFAULT_MODEL }}
          CHANGELOG_FILE: ${{ github.event.inputs.changelog_file || env.CHANGELOG_FILE }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      # ── Stage 2: AI updates Bruno collection ────────────────────────────────
      - name: 📁 Stage 2 — AI updates Bruno collection
        run: python scripts/update_collection.py --stage collection
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event.inputs.model || env.DEFAULT_MODEL }}
          COLLECTION_DIR: ${{ github.event.inputs.collection_dir || env.COLLECTION_DIR }}
          CHANGELOG_FILE: ${{ github.event.inputs.changelog_file || env.CHANGELOG_FILE }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      # ── Commit both outputs in one commit ───────────────────────────────────
      - name: 🔍 Check for generated changes
        id: check_changes
        run: |
          COLLECTION_DIR="${{ github.event.inputs.collection_dir || env.COLLECTION_DIR }}"

          # Stage only generated artifacts
          git add CHANGELOG.md "$COLLECTION_DIR"

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No generated changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "📄 Generated changes:"
            git diff --cached --name-only
          fi

      - name: 💾 Commit updated collection
        if: >
          steps.check_changes.outputs.changed == 'true' &&
          github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "🤖 chore: auto-update Bruno API collection

          Model     : ${{ github.event.inputs.model || env.DEFAULT_MODEL }}
          Trigger   : ${{ github.event_name }}
          Ref       : ${{ github.ref_name }}
          Commit SHA: ${{ github.sha }}"

          git push

      - name: 🧪 Dry run summary
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN — diff that would have been committed ==="
          git diff HEAD

      - name: ✅ Nothing to update
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "Changelog and collection are already up to date."
