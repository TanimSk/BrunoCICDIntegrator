name: Update API Collection

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  update-api-collection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      - name: Inspect commit messages
        id: inspect
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          repo_root = Path(os.environ["GITHUB_WORKSPACE"])
          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          event = json.loads(event_path.read_text(encoding="utf-8"))
          before = str(event.get("before", ""))
          after = str(event.get("after") or os.environ.get("GITHUB_SHA", ""))
          marker = "sync bru"

          messages = []
          if before and before != "0000000000000000000000000000000000000000" and after:
              result = subprocess.run(
                  ["git", "log", "--format=%s", "--reverse", f"{before}..{after}"],
                  cwd=repo_root,
                  check=False,
                  capture_output=True,
                  text=True,
              )
              if result.returncode == 0:
                  messages = [line.strip() for line in result.stdout.splitlines() if line.strip()]

          if not messages:
              commits = event.get("commits", [])
              messages = [
                  str(commit.get("message", "")).splitlines()[0]
                  for commit in commits
                  if str(commit.get("message", "")).strip()
              ]

          latest_message = messages[-1] if messages else ""
          latest_has_marker = marker in latest_message.lower()
          marker_positions = [index for index, message in enumerate(messages) if marker in message.lower()]

          should_run = bool(messages) and latest_has_marker
          mode = "skip"
          if should_run:
              mode = "full" if marker_positions and marker_positions[0] == len(messages) - 1 else "sync"

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"should_run={'true' if should_run else 'false'}\n")
              handle.write(f"mode={mode}\n")

          print(f"latest_message={latest_message}")
          print(f"message_count={len(messages)}")
          print(f"marker_count={len(marker_positions)}")
          print(f"should_run={should_run}")
          print(f"mode={mode}")
          PY

      - name: Generate project understanding
        if: steps.inspect.outputs.should_run == 'true' && steps.inspect.outputs.mode == 'full'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/project_understanding.py

      - name: Generate Bruno collection from changelog
        if: steps.inspect.outputs.should_run == 'true' && steps.inspect.outputs.mode == 'full'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_bru_from_changelog.py

      - name: Sync Bruno collection from changelog
        if: steps.inspect.outputs.should_run == 'true' && steps.inspect.outputs.mode == 'sync'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/changelog_bru_sync.py
